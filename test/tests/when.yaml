prog: "crazy-complete-test"
options:
  - option_strings: ['--option-1']

  - option_strings: ['--option-2']

  - option_strings: ['--if-1-and-2']
    when: 'has_option --option-1 && has_option --option-2'

  - option_strings: ['--if-1-or-2']
    when: 'has_option --option-1 || has_option --option-2'

  - option_strings: ['--if-not-1']
    when: '! has_option --option-1'

  - option_strings: ['--if-not-1-or-not-2']
    when: '! (has_option --option-1 || has_option --option-2)'

---

prog: "crazy-complete-test positionals"
options:
  - option_strings: ['--if-positional-count']
    when: 'positional_count >= 2'

  - option_strings: ['--if-positional-contains']
    when: 'positional_contains 2 foo bar'

  - option_strings: ['--if-positional-contains-nocase']
    when: 'positional_contains -i 2 foo bar'

---

prog: "crazy-complete-test multiple-when"
options:
  - option_strings: ['--files']

  - option_strings: ['--directories']

  - option_strings: ['--complete']
    complete: ['choices', ['file1', 'file2', 'file3']]
    when: 'has_option --files'

  - option_strings: ['--complete']
    complete: ['choices', ['dir1', 'dir2', 'dir3']]
    when: 'has_option --directories'

positionals:
  - number: 1
    complete: ['choices', ['file1', 'file2', 'file3']]
    when: 'has_option --files'

  - number: 1
    complete: ['choices', ['dir1', 'dir2', 'dir3']]
    when: 'has_option --directories'

---

prog: "crazy-complete-test special-values"
options:
  - option_strings: ['--arg']
    complete: ['none']

  - option_strings: ['--if-arg-is-foo-bar']
    when: 'option_is --arg -- "foo bar"'

  - option_strings: ['--if-arg-is-single-quote']
    when: "option_is --arg -- \"'\""

  - option_strings: ['--if-arg-is-double-quote']
    when: "option_is --arg -- '\"'"

---

prog: "crazy-complete-test advanced"
options:
  - option_strings: ['--arg']
    complete: ['none']

  - option_strings: ['--if-arg-is-foo-or-bar-nocase']
    when: 'option_is NOCASE --arg -- foo bar'

  - option_strings: ['--if-arg-is-regex']
    when: 'option_match --arg -- "reg(ex)?"'

  - option_strings: ['--if-arg-is-regex-nocase']
    when: 'option_match NOCASE --arg -- "reg(ex)?"'

---

prog: "crazy-complete-test any"
options:
  - option_strings: ['--arg']
    complete: ['none']

  - option_strings: ['--if-arg-is-foo']
    when: 'option_is --arg -- foo'

  - option_strings: ['--if-any-arg-is-foo']
    when: 'option_is ANY --arg -- foo'

  - option_strings: ['--if-arg-is-regex']
    when: 'option_match --arg -- "reg(ex)?"'

  - option_strings: ['--if-any-arg-is-regex']
    when: 'option_match ANY --arg -- "reg(ex)?"'
